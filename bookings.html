<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>

<style>
body{
    font-family: Arial;
    background:#f5efe6;
    padding:30px;
}

h2{
    margin-bottom:20px;
}

.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    margin-top:10px;
    padding:8px 12px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

.back-btn{
    margin-top:20px;
    background:#333;
    color:white;
}
</style>
</head>

<body>

<h2>My Bookings</h2>

<div id="list"></div>

<button class="back-btn" onclick="goBack()">Back</button>

<script>

// 🔒 protect page
if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href="login.html";
}

let user = localStorage.getItem("email");
let data = JSON.parse(localStorage.getItem("bookings") || "[]");

// show bookings
function showBookings(){
    let list = document.getElementById("list");
    list.innerHTML = "";

    let userBookings = data.filter(x => x.user === user);

    if(userBookings.length === 0){
        list.innerHTML = "No bookings yet";
        return;
    }

    userBookings.forEach((b, index) => {
        list.innerHTML += `
        <div class="card">
            <b>${b.item}</b><br>
            Type: ${b.type}<br>
            Date: ${b.date}<br>

            <button onclick="cancelBooking(${index})">Cancel Booking</button>
        </div>`;
    });
}

// ❌ cancel booking
function cancelBooking(i){
    let confirmCancel = confirm("Are you sure you want to cancel this booking?");
    
    if(confirmCancel){
        let userBookings = data.filter(x => x.user === user);

        let target = userBookings[i];

        // remove from main storage
        data = data.filter(b => b !== target);

        localStorage.setItem("bookings", JSON.stringify(data));

        showBookings(); // refresh UI
    }
}

// 🔙 back button
function goBack(){
    window.location.href="home.html";
}

// initial load
showBookings();

</script>

</body>
</html>
