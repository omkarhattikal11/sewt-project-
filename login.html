<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivienne Login</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

/* 🌟 BODY */
body {
  font-family: 'Inter', sans-serif;
  background-color: #e8dfd3;
  color:#3a322b;
}

/* 🌟 CENTER */
.main {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* 🌟 CARD */
.container {
  display:flex;
  width:900px;
  height:550px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(15px);
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* LEFT */
.left {
  width:50%;
  padding:40px;
}

/* LOGO */
.logo-img {
  display:block;
  margin:0 auto 10px;
  width:90px;
  border-radius:10px;
}

/* BRAND */
.brand {
  text-align:center;
  font-size:36px;
  font-family:'Playfair Display', serif;
  color:#8b6f47;
  letter-spacing:3px;
  margin-bottom:10px;
}

/* TITLE */
h1 {
  text-align:center;
  font-size:20px;
  color:#6d5c4a;
  margin-bottom:20px;
}

/* INPUT */
.field {
  margin-bottom:15px;
  position:relative;
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#f3ece4;
  outline:none;
}

/* PASSWORD ICON */
.toggle {
  position:absolute;
  right:10px;
  top:12px;
  cursor:pointer;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:600;
}

/* BUTTON COLORS */
.register-btn {
  background:#b08d57;
}

.login-btn {
  background:#6d5c4a;
}

button:hover {
  opacity:0.9;
}

/* LINK */
p {
  text-align:center;
  margin-top:10px;
}

a {
  color:#8b6f47;
  text-decoration:none;
  font-weight:600;
}

/* RIGHT IMAGE */
.right {
  width:50%;
}

.right img {
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<div class="main">
<div class="container">

<!-- LEFT -->
<div class="left">

<img class="logo-img" src="https://i.pinimg.com/736x/d9/b9/93/d9b993d8eecfeb1f669f1a30f66030cb.jpg">

<div class="brand">VIVIENNE</div>

<h1 id="title">Create Account</h1>

<!-- REGISTER -->
<div id="registerBox">
  <div class="field"><input type="text" placeholder="Name" id="name"></div>
  <div class="field"><input type="email" placeholder="Email" id="email"></div>

  <div class="field">
    <input type="password" id="password" placeholder="Password">
    <span class="toggle" onclick="togglePass('password')">👁</span>
  </div>

  <button class="register-btn" onclick="register()">Sign Up</button>

  <p>Already have account? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- LOGIN -->
<div id="loginBox" style="display:none;">
  <div class="field"><input type="email" id="loginEmail" placeholder="Email"></div>

  <div class="field">
    <input type="password" id="loginPassword" placeholder="Password">
    <span class="toggle" onclick="togglePass('loginPassword')">👁</span>
  </div>

  <button class="login-btn" onclick="login()">Login</button>

  <p>New user? <a href="#" onclick="showRegister()">Register</a></p>
</div>

</div>

<!-- RIGHT IMAGE -->
<div class="right">
<img id="slider">
</div>

</div>
</div>

<script>

/* IMAGE SLIDER */
let images = [
 "https://i.pinimg.com/736x/33/95/2d/33952d048f576dbf161cdcafb4c09a0d.jpg",
 "https://i.pinimg.com/736x/34/95/87/3495876ebb5db6669f6e0b4b30541032.jpg",
 "https://i.pinimg.com/1200x/4e/94/0b/4e940bba5637210c36728346a61549ff.jpg",
 "https://i.pinimg.com/736x/f2/40/76/f240762c2bcd5306f8565366bff38809.jpg",
 "https://i.pinimg.com/736x/ad/03/b7/ad03b7efff535c7e50668680cb60eb9a.jpg",
 "https://i.pinimg.com/736x/36/4f/5b/364f5bb836076a2f3ddc6a835eb8afd7.jpg"
];

let i=0;
let slider=document.getElementById("slider");
slider.src=images[0];

setInterval(()=>{
  i=(i+1)%images.length;
  slider.src=images[i];
},2000);


/* VALIDATION */
function validEmail(email){
  return /^[^ ]+@[^ ]+\.[a-z]{2,3}$/.test(email);
}

function validPassword(pass){
  return pass.length>=8 && /\d/.test(pass);
}

/* TOGGLE PASSWORD */
function togglePass(id){
  let x=document.getElementById(id);
  x.type = x.type==="password" ? "text" : "password";
}

/* REGISTER */
async function register(){
  let name=document.getElementById("name").value.trim();
  let email=document.getElementById("email").value.trim();
  let pass=document.getElementById("password").value;

  if(name.length<3){
    alert("Name must be at least 3 characters");
    return;
  }

  if(!validEmail(email)){
    alert("Enter valid email");
    return;
  }

  if(!validPassword(pass)){
    alert("Password must be 8+ characters & include a number");
    return;
  }

  let res = await fetch("http://localhost:3000/register", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ name, email, password: pass })
  });

  let data = await res.json();

  if(data.success){
    alert("Registered Successfully ✅");
    showLogin();
  }else{
    alert(data.message);
  }
}

/* LOGIN */
async function login(){
  let email=document.getElementById("loginEmail").value;
  let pass=document.getElementById("loginPassword").value;

  let res = await fetch("http://localhost:3000/login", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({ email, password: pass })
  });

  let data = await res.json();

  if(data.success){
    localStorage.setItem("loggedIn","true");
    localStorage.setItem("name", data.user.name);

    alert("Login Success 🎉");
    window.location.href="home.html";
  }else{
    alert("Invalid login ❌");
  }
}

/* SWITCH */
function showLogin(){
  registerBox.style.display="none";
  loginBox.style.display="block";
  title.innerText="Welcome Back";
}

function showRegister(){
  registerBox.style.display="block";
  loginBox.style.display="none";
  title.innerText="Create Account";
}

</script>

</body>
</html>
