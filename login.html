<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<!-- ✅ GOOGLE FONT (HEEBO) -->
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #ffd6e0, #ffc0cb);
}

.main {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  display: flex;
  width: 900px;
  height: 550px;
  background: rgba(255,255,255,0.3);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.left {
  width: 50%;
  padding: 40px;
}

/* 🔥 VIVIENNE UPDATED FONT STYLE */
.brand {
  text-align: center;
  font-size: 48px;   /* slightly bigger */
  font-weight: 700;
  color: purple;
  margin-bottom: 10px;
  letter-spacing: 4px;

  font-family:Georgia, 'Times New Roman', Times, serif;
 
}

.logo-img {
  display: block;
  margin: 0 auto 15px auto;
  width: 120px;
  height: auto;
  border-radius: 10px;
}

/* Create Account smaller */
h1 {
  font-size: 20px;
  margin-bottom: 20px;
  color: #b03060;
  text-align: center;
  
}

.field {
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.register-btn {
  background: linear-gradient(to right, #ff6f91, #ff9eb5);
}

.login-btn {
  background: linear-gradient(to right, #8e44ad, #c39bd3);
}

.login-link {
  font-size: 13px;
  margin-top: 10px;
}

.right {
  width: 50%;
}

.right img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: opacity 0.5s;
}
</style>
</head>

<body>

<div class="main">
<div class="container">

<div class="left">

<img class="logo-img" src="https://i.pinimg.com/736x/d9/b9/93/d9b993d8eecfeb1f669f1a30f66030cb.jpg" alt="Logo">

<div class="brand">VIVIENNE</div>

<h1 id="title">Create Account</h1>

<div id="registerBox">
  <div class="field"><input type="text" placeholder="Name" id="name"></div>
  <div class="field"><input type="email" placeholder="Email" id="email"></div>
  <div class="field"><input type="password" id="password" placeholder="Password"></div>

  <button class="register-btn" onclick="register()">Sign Up</button>

  <p class="login-link">
    Already have account?
    <a href="#" onclick="showLogin()">Login</a>
  </p>
</div>

<div id="loginBox" style="display:none;">
  <div class="field"><input type="email" id="loginEmail" placeholder="Email"></div>
  <div class="field"><input type="password" id="loginPassword" placeholder="Password"></div>

  <button class="login-btn" onclick="login()">Login</button>

  <p class="login-link">
    New user?
    <a href="#" onclick="showRegister()">Register</a>
  </p>
</div>

</div>

<div class="right">
  <img id="slider" src="">
</div>

</div>
</div>

<script>
let images = [
  "https://i.pinimg.com/736x/33/95/2d/33952d048f576dbf161cdcafb4c09a0d.jpg",
  "https://i.pinimg.com/736x/34/95/87/3495876ebb5db6669f6e0b4b30541032.jpg",
  "https://i.pinimg.com/1200x/4e/94/0b/4e940bba5637210c36728346a61549ff.jpg",
  "https://i.pinimg.com/736x/f2/40/76/f240762c2bcd5306f8565366bff38809.jpg",
  "https://i.pinimg.com/736x/ad/03/b7/ad03b7efff535c7e50668680cb60eb9a.jpg",
  "https://i.pinimg.com/736x/36/4f/5b/364f5bb836076a2f3ddc6a835eb8afd7.jpg"
];

let i = 0;
let slider = document.getElementById("slider");
slider.src = images[i];

setInterval(() => {
  slider.style.opacity = 0;
  setTimeout(() => {
    i = (i + 1) % images.length;
    slider.src = images[i];
    slider.style.opacity = 1;
  }, 300);
}, 2000);

function register() {
  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if (!name || !email || !pass) {
    alert("Fill all fields");
    return;
  }

  localStorage.setItem("name", name);
  localStorage.setItem("email", email);
  localStorage.setItem("password", pass);

  alert("Registered Successfully 💖");
  showLogin();
}

function login() {
  let email = document.getElementById("loginEmail").value;
  let pass = document.getElementById("loginPassword").value;

  if (email === localStorage.getItem("email") &&
      pass === localStorage.getItem("password")) {

    localStorage.setItem("loggedIn", "true");

    alert("Welcome 🎉 " + localStorage.getItem("name"));

    window.location.href = "home.html";
  } else {
    alert("Invalid login");
  }
}

function showLogin() {
  document.getElementById("registerBox").style.display = "none";
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("title").innerText = "Welcome Back";
}

function showRegister() {
  document.getElementById("registerBox").style.display = "block";
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("title").innerText = "Create Account";
}
</script>

</body>
</html>
