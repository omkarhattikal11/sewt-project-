<!DOCTYPE html>
<html>
<head>
<title>Search Results</title>
<style>
body{
  font-family:Arial;
  background:#f5efe6;
  padding:20px;
}

h1{
  margin-bottom:20px;
}

.results{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
}

.card img{
  width:100%;
  height:350px;
  object-fit:contain;
  background:#f8f8f8;
}

.info{
  padding:15px;
}

  .premium-heading{
  text-align:center;
  font-size:32px;
  font-weight:bold;
  color:white;
  margin-bottom:30px;
  padding:18px;
  border-radius:50px;
  background:linear-gradient(45deg,#6b4f2a,#b08d57);
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
  letter-spacing:1px;
}
</style>
</head>
<body>

<div class="premium-heading">
   ✨ Premium Rental Collection
</div>
<div class="results" id="results"></div>

<script>
const params = new URLSearchParams(window.location.search);
const query = params.get("q");

/* PRODUCT DATABASE */
const productDatabase = {
  "blazers,suits": [
    "Classic Blue Blazer","Premium Tuxedo Set","Formal Elite Blazer",
    "Wedding Luxe Suit","Slim Fit Office Blazer","Royal Navy Suit",
    "Business Formal Wear","Signature Evening Suit","Executive Blazer",
    "Classy Subtle Suit","Tailored Premium Blazer","Luxury Party Suit",
    "Modern Groom Suit","Classic Gentleman Suit","Occasion Blazer Set"
  ],

  "bodycons":[
    "Midnight Glam Dress","Elegant Curve Dress","Wine Red Statement",
    "Velvet Evening Wear","Date Night Dress","Signature Glam Outfit ",
    "Celebrity Inspired Look","Minimal Chic Bodycon","Princess bow fit",
    "Bold Party Fit","Luxury Satin Dress","Classic Black Fit ",
    "Cocktail Night Dress"
  ],

  "lehenga":[
    "Royal Bridal Lehenga","Designer Wedding Collection","Luxury Festive Lehenga",
    "Celebrity Inspired Lehenga","Traditional Premium Wear","Grand Occasion Collection",
    "Wedding Luxe Edition","Elegant Celebration Outfit","Premium Bridal Set",
    "Classic Festive Lehenga","Luxury Party Collection","Modern Traditional Look",
    "Designer Exclusive Wear","Signature Wedding Edition","Royal Premium Outfit"
  ],

  "kurtas":[
    "Festive Kurta Set","Classic Cotton Kurta","Wedding Special Kurta",
    "Premium Ethnic Wear","Traditional Luxe Set","Designer Kurta Collection",
    "Celebration Special","Elegant Ethnic Wear","Modern Traditional Fit",
    "Premium Ceremony Kurta","Classic Festive Outfit","Royal Kurta Set",
    "Luxury Occasion Wear","Designer Traditional Set","Ethnic Signature"
  ],

  "sarees":[
    "Kanjivaram Silk Saree","Wedding Premium Saree","Designer Party Saree",
    "Classic Silk Collection","Luxury Festive Saree","Elegant Drapes Collection",
    "Premium Bridal Saree","Signature Occasion Wear","Celebrity Inspired Saree",
    "Traditional Luxe Set","Royal Celebration Saree","Minimal Premium Saree",
    "Classic Wedding Collection","Luxury Draped Elegance","Festive Statement Saree"
  ],

  "shirts":[
    "Classic White Shirt","Premium Formal Shirt","Minimal Office Shirt",
    "Luxury Casual Shirt","Executive Collection","Modern Fit Shirt",
    "Designer Shirt Set","Signature Casual Collection","Tailored Formal Wear",
    "Essential Shirt Collection","Premium Cotton Shirt","Business Casual Wear",
    "Classic Everyday Shirt","Luxury Style Collection","Modern Essentials"
  ],

  "tops":[
    "Minimal Casual Top","Premium Crop Collection","Luxury Everyday Wear",
    "Elegant Fashion Top","Designer Chic Wear","Statement Style Top",
    "Classic Casual Collection","Modern Street Fashion","Premium Summer Wear",
    "Minimal Daily Outfit","Luxury Trend Collection","Celebrity Inspired Top",
    "Designer Everyday Wear","Fashion Essentials","Premium Style Top"
  ]
};

/* GET PRODUCTS */
const products = productDatabase[query] || [];

let html = "";

for(let i=1; i<=products.length; i++){
  html += `
  <div class="card" onclick="openProduct('${query}',${i})">
    <img src="images/${query}/${i}.jpg">
    <div class="info">
      <h3>${products[i-1]}</h3>
      <p>Shop Name: Vivienne Rentals ${i}</p>
      <p>Location: Bangalore</p>
    </div>
  </div>
  `;
}

document.getElementById("results").innerHTML = html;

function openProduct(name,id){
  let productName = products[id-1];

  window.location.href =
  "product.html?item=" + name +
  "&id=" + id +
  "&product=" + encodeURIComponent(productName);
}
</script>

</body>
</html>
