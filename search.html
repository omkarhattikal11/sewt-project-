  <div class="card" onclick="openProduct('${query}',${i})">
    <img src="images/${query}/${i}.jpg">
    <div class="info">
      <h3>${products[i-1]}</h3>
      <p>Shop Name: ${shopData[query][i-1].shop}</p>
<p>Location: ${shopData[query][i-1].location}</p>
    </div>
  </div>
  `;
}

document.getElementById("results").innerHTML = html;

function openProduct(name,id){
  let productName = products[id-1];

  window.location.href =
  "product.html?item=" + name +
  "&id=" + id +
  "&product=" + encodeURIComponent(productName);
}
</script>

</body>
</html>
