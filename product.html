<!DOCTYPE html>
<html>
<head>
<title>Product Details</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(to right,#f8f5ef,#f3ede3);
  color:#333;
}

/* HEADER */
.header{
  text-align:center;
  padding:35px;
}

.title-badge{
  display:inline-block;
  padding:14px 28px;
  background:linear-gradient(45deg,#6b4f2a,#b08d57);
  color:white;
  border-radius:40px;
  font-size:28px;
  font-weight:bold;
  box-shadow:0 8px 20px rgba(0,0,0,0.18);
}

/* MAIN */
.container{
  max-width:1200px;
  margin:auto;
  padding:30px;
}

.card{
  background:white;
  border-radius:25px;
  box-shadow:0 12px 35px rgba(0,0,0,0.12);
  padding:35px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
}

.product-img{
  width:100%;
  height:650px;
  object-fit:contain;
  background:#fafafa;
  border-radius:18px;
}

/* RIGHT PANEL */
.details h2{
  font-size:34px;
  margin-top:0;
  color:#2d2215;
}

.price{
  font-size:30px;
  font-weight:bold;
  color:#6b4f2a;
  margin-bottom:20px;
}

.info-box{
  background:#faf7f2;
  padding:22px;
  border-radius:16px;
  margin-bottom:18px;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

.info-box h3{
  margin-top:0;
}

input,select{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:1px solid #ddd;
  border-radius:12px;
  font-size:15px;
}

button{
  padding:14px 20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:15px;
  transition:0.3s;
}

.primary-btn{
  background:linear-gradient(45deg,#6b4f2a,#9a7443);
  color:white;
  width:100%;
}

.primary-btn:hover{
  transform:translateY(-3px);
}

/* SIZE */
.sizes{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.size{
  padding:10px 16px;
  border:1px solid #6b4f2a;
  border-radius:10px;
  cursor:pointer;
}

.size:hover{
  background:#6b4f2a;
  color:white;
}
  .size.selected{
  background:#6b4f2a;
  color:white;
  transform:scale(1.05);
  box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* REVIEWS */
.reviews{
  margin-top:35px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.review{
  padding:15px;
  border-bottom:1px solid #eee;
}

.hidden{
  display:none;
}

/* PAYMENT */
.payment{
  margin-top:35px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.pay-options{
  display:flex;
  gap:20px;
}

.pay-box{
  flex:1;
  padding:20px;
  border:2px solid #ddd;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
}

.pay-box:hover{
  border-color:#6b4f2a;
  background:#faf7f2;
}
</style>
</head>

<body>

<div class="header">
  <div class="title-badge">✨ Premium Rental Collection</div>
</div>

<div class="container">

  <div class="card">

    <img id="productImg" class="product-img">

    <div class="details">

      <h2 id="productName"></h2>

      <div class="price">₹100 / hour</div>

      <div class="info-box">
        <p><b>🏪 Shop:</b> Royal Rentals</p>
        <p><b>📍 Location:</b> Bangalore</p>
      </div>

      <div class="info-box">
        <h3>Rental Duration</h3>

        From:
        <input type="date" id="fromDate">

        To:
        <input type="date" id="toDate">

        <br><br>
        <button class="primary-btn" onclick="calculatePrice()">
          Calculate Total Price
        </button>

        <p id="price"></p>
      </div>

     <div class="info-box" id="sizeSection">
  <h3 id="sizeTitle">Select Size</h3>

  <div class="sizes" id="sizesContainer">
    <div class="size" onclick="checkSize(this)">XS</div>
    <div class="size" onclick="checkSize(this)">S</div>
    <div class="size" onclick="checkSize(this)">M</div>
    <div class="size" onclick="checkSize(this)">L</div>
    <div class="size" onclick="checkSize(this)">XL</div>
    <div class="size" onclick="checkSize(this)">XXL</div>
    <div class="size" onclick="checkSize(this)">XXXL</div>
  </div>

  <p id="sizeStatus" style="margin-top:12px;font-weight:bold;"></p>
</div>

    </div>
  </div>

  <div class="reviews">
  <h2>⭐ Reviews & Ratings</h2>

  <div id="reviewContainer"></div>

  <br>
  <button class="primary-btn" onclick="showMoreReviews()">
    See More Reviews
  </button>
</div>

  <div class="payment">
    <h2>Payment Options</h2>

    <div class="pay-options">
      <div class="pay-box">💵 Cash on Delivery</div>
      <div class="pay-box">📱 UPI Payment</div>
    </div>

    <br>
    <button class="primary-btn" onclick="placeOrder()">
      Place Order
    </button>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const item = params.get("item");
const id = params.get("id");
const product = params.get("product");

  const reviewData = {
  default: [
    "⭐⭐⭐⭐⭐ Amazing quality and premium fabric.",
    "⭐⭐⭐⭐ Perfect fitting and clean outfit.",
    "⭐⭐⭐⭐⭐ Delivery was very fast.",
    "⭐⭐⭐⭐ Worth every rupee.",
    "⭐⭐⭐⭐⭐ Will rent again.",
    "⭐⭐⭐⭐ Excellent stitching.",
    "⭐⭐⭐⭐⭐ Looked brand new.",
    "⭐⭐⭐⭐ Nice packaging.",
    "⭐⭐⭐⭐⭐ Customer support was helpful.",
    "⭐⭐⭐⭐ Great rental experience."
  ],

  footwear: [
    "⭐⭐⭐⭐⭐ Very comfortable to wear.",
    "⭐⭐⭐⭐ Looked stylish and trendy.",
    "⭐⭐⭐⭐⭐ Perfect fit and clean condition.",
    "⭐⭐⭐⭐ Great quality footwear.",
    "⭐⭐⭐⭐⭐ Heels were stable and comfortable.",
    "⭐⭐⭐⭐ Premium finish.",
    "⭐⭐⭐⭐⭐ Worth renting.",
    "⭐⭐⭐⭐ Delivery was on time.",
    "⭐⭐⭐⭐ Good collection available.",
    "⭐⭐⭐⭐⭐ Will order again."
  ],

  jewellery: [
    "⭐⭐⭐⭐⭐ Looked luxurious and elegant.",
    "⭐⭐⭐⭐ Perfect for weddings.",
    "⭐⭐⭐⭐⭐ Jewellery was shiny and premium.",
    "⭐⭐⭐⭐ Great finishing and detailing.",
    "⭐⭐⭐⭐⭐ Looked exactly like pictures.",
    "⭐⭐⭐⭐ Packaging was secure.",
    "⭐⭐⭐⭐⭐ Premium bridal collection.",
    "⭐⭐⭐⭐ Elegant design.",
    "⭐⭐⭐⭐ Worth the rental price.",
    "⭐⭐⭐⭐⭐ Received many compliments."
  ]
};
  let selectedReviews = reviewData.default;

if(item === "footwear"){
  selectedReviews = reviewData.footwear;
}

if(item === "jewellery"){
  selectedReviews = reviewData.jewellery;
}

let reviewHTML = "";

selectedReviews.forEach((review,index)=>{
  reviewHTML += `
    <div class="review ${index >= 5 ? 'hidden extra-review' : ''}">
      ${review}
    </div>
  `;
});

document.getElementById("reviewContainer").innerHTML = reviewHTML;
  
  if(item === "footwear"){
  document.getElementById("sizeTitle").innerText = "Select Footwear Size";

  document.getElementById("sizesContainer").innerHTML = `
    <div class="size" onclick="checkSize(this)">6</div>
    <div class="size" onclick="checkSize(this)">7</div>
    <div class="size" onclick="checkSize(this)">8</div>
    <div class="size" onclick="checkSize(this)">9</div>
    <div class="size" onclick="checkSize(this)">10</div>
  `;
}

if(item === "jewellery"){
  document.getElementById("sizeSection").style.display = "none";
}

document.getElementById("productName").innerText = product;

document.getElementById("productImg").src =
"images/" + item + "/" + id + ".jpg";

function calculatePrice(){
  let from = new Date(document.getElementById("fromDate").value);
  let to = new Date(document.getElementById("toDate").value);

  let diff = (to-from)/(1000*60*60*24);

  let blockedDates = [5,12,18]; // some unavailable dates

  if(blockedDates.includes(from.getDate())){
    document.getElementById("price").innerHTML =
    "❌ Sorry, outfit unavailable during selected dates";
    document.getElementById("price").style.color="red";
    return;
  }

  if(diff>0){
    let total = diff * 24 * 100;

    document.getElementById("price").innerHTML =
    "✅ Available for rent<br><br>Total Price: ₹" + total;

    document.getElementById("price").style.color="green";
  }
}
 function checkSize(element){

  document.querySelectorAll(".size").forEach(size=>{
    size.classList.remove("selected");
  });

  element.classList.add("selected");

  let unavailableSizes = ["XS","XXXL"];
  let selectedSize = element.innerText;

  if(unavailableSizes.includes(selectedSize)){
    document.getElementById("sizeStatus").innerHTML =
    "❌ Sorry, this size is currently unavailable";
    document.getElementById("sizeStatus").style.color = "red";
  }else{
    document.getElementById("sizeStatus").innerHTML =
    "✅ Size available for booking";
    document.getElementById("sizeStatus").style.color = "green";
  }
}

function placeOrder(){
  alert("Order placed successfully ✅");
}

function showMoreReviews(){
  document.querySelectorAll(".extra-review").forEach(r=>{
    r.style.display = "block";
  });
}
</script>

</body>
</html>
